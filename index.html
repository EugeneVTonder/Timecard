<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Timecard</title>
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Timecard">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B1E26">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#1B1E26; --surface:#242832; --surface-2:#2C313D; --border:#3A4150;
    --text:#E9ECF1; --text-dim:#9BA4B5;
    --accent:#D4A24C; --accent-dim:#8A703A;
    --normal:#5BA88F; --overtime:#D4753F; --under:#7E8AA8;
    --leave:#7C8CC4; --sick:#B4708A; --danger:#C4574F;
    --live:#5BA88F; --pause:#D9B054;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  #appShell{display:flex;flex-direction:column;height:100vh;height:100dvh;}
  .app-header{
    flex:0 0 auto;
    padding:22px 20px 18px;
    padding-top:calc(env(safe-area-inset-top, 0px) + 6mm);
    border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .stamp{width:42px;height:42px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;color:var(--accent);font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:11px;transform:rotate(-8deg);flex-shrink:0;}
  .brand h1{font-size:20px;letter-spacing:0.3px;}
  .brand .sub{color:var(--text-dim);font-size:12px;margin-top:2px;}
  .today-chip{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);text-align:right;}
  .today-chip .dow{color:var(--accent);font-weight:600;}

  nav.tabs{
    flex:0 0 auto;
    display:flex;background:var(--surface);border-top:1px solid var(--border);
    padding-bottom:env(safe-area-inset-bottom, 0px);
  }
  nav.tabs button{flex:1;padding:12px 4px 10px;background:none;border:none;color:var(--text-dim);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
  nav.tabs button .ic{font-size:18px;}
  nav.tabs button.active{color:var(--accent);}

  main{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;max-width:760px;margin:0 auto;padding:20px 16px 30px;width:100%;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
  .card-title{font-size:13px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;}
  .row-between{display:flex;align-items:center;justify-content:space-between;}

  .btn{background:var(--accent);color:#1B1E26;border:none;padding:10px 16px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}
  .btn:disabled{opacity:0.4;cursor:default;}
  .btn.secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
  .btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger);}
  .btn.small{padding:6px 12px;font-size:12px;}
  .btn.full{width:100%;}
  .btn.ghost{background:none;color:var(--text-dim);border:1px solid var(--border);}

  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
  .badge.office{background:#2E3D4A;color:#7FB8D9;}
  .badge.remote{background:#31402F;color:#8FCB86;}
  .badge.site{background:#403A2E;color:#D9B67F;}
  .badge.normal{background:#233A34;color:var(--normal);}
  .badge.overtime{background:#3E2E22;color:var(--overtime);}
  .badge.under{background:#292E3D;color:var(--under);}
  .badge.annual{background:#292E45;color:var(--leave);}
  .badge.sick{background:#3D2530;color:var(--sick);}
  .badge.lunch{background:#3A3320;color:#D9B054;}
  .badge.break{background:#2A3340;color:#8FAFC7;}

  /* ---- stopwatch ---- */
  .stopwatch{
    background:radial-gradient(circle at 50% 0%, #2D3340 0%, var(--surface) 70%);
    border:1px solid var(--border);border-radius:16px;padding:26px 20px;margin-bottom:16px;text-align:center;
  }
  .sw-state{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-dim);margin-bottom:6px;}
  .sw-state.live{color:var(--live);}
  .sw-state.paused{color:var(--pause);}
  .sw-timer{font-family:'IBM Plex Mono',monospace;font-size:48px;font-weight:600;letter-spacing:1px;line-height:1;margin:6px 0 4px;}
  .sw-timer.paused{color:var(--pause);}
  .sw-sub{font-size:12px;color:var(--text-dim);margin-bottom:18px;}
  .sw-loc-seg{display:flex;background:var(--surface-2);border-radius:10px;padding:4px;gap:4px;margin-bottom:16px;}
  .sw-loc-seg button{flex:1;background:none;border:none;color:var(--text-dim);padding:10px 6px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .sw-loc-seg button.active{background:var(--accent);color:#1B1E26;}
  .sw-clockin-btn{width:120px;height:120px;border-radius:50%;background:var(--accent);color:#1B1E26;border:none;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;cursor:pointer;margin:6px auto;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 8px rgba(212,162,76,0.12);}
  .sw-clockin-btn:active{transform:scale(0.97);}
  .sw-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .sw-actions.paused-mode{grid-template-columns:1fr;}
  .sw-actions button{padding:12px 6px;font-size:12.5px;}
  .sw-today-total{margin-top:16px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--text-dim);}
  .sw-today-total b{color:var(--text);font-family:'IBM Plex Mono',monospace;}

  .entry-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;}
  .entry-row:last-child{border-bottom:none;}
  .entry-date{font-weight:600;font-size:14px;}
  .entry-sub{color:var(--text-dim);font-size:12px;margin-top:3px;font-family:'IBM Plex Mono',monospace;}
  .entry-hours{text-align:right;}
  .entry-hours .h{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:15px;}

  .day-card{margin-bottom:12px;}
  .day-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
  .day-card-head .dtitle{font-weight:600;font-size:14px;}
  .day-card-head .dtotal{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;}

  .month-label{font-size:12px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:0.6px;margin:18px 0 6px;}
  .empty{text-align:center;color:var(--text-dim);padding:40px 20px;font-size:13px;}

  .modal-overlay{position:fixed;inset:0;background:rgba(10,12,16,0.6);display:none;align-items:flex-end;justify-content:center;z-index:100;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);width:100%;max-width:520px;border-radius:16px 16px 0 0;padding:20px 18px 24px;max-height:88vh;overflow-y:auto;}
  @media(min-width:600px){.modal-overlay{align-items:center;} .modal{border-radius:16px;}}
  .modal h2{font-size:17px;margin-bottom:16px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;}
  .field input[type=text],.field input[type=date],.field input[type=time],.field input[type=number],.field textarea,.field select{
    width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 10px;font-size:14px;font-family:'Inter',sans-serif;
  }
  .field textarea{resize:vertical;min-height:60px;font-family:'Inter',sans-serif;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .seg{display:flex;background:var(--surface-2);border-radius:8px;padding:3px;gap:3px;}
  .seg button{flex:1;background:none;border:none;color:var(--text-dim);padding:8px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;}
  .seg button.active{background:var(--accent);color:#1B1E26;font-weight:600;}

  .break-item{display:grid;grid-template-columns:80px 1fr 1fr 32px;gap:8px;align-items:center;margin-bottom:8px;}
  .break-item select{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px;font-size:12px;}
  .icon-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:4px 8px;}
  .icon-btn:hover{color:var(--danger);}

  .modal-actions{display:flex;gap:10px;margin-top:18px;}
  .modal-actions .btn{flex:1;}

  .sched-day{display:grid;grid-template-columns:42px 1fr 1fr 70px 44px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .sched-day:last-child{border-bottom:none;}
  .sched-day .dname{font-weight:600;color:var(--text-dim);}
  .sched-day input[type=time],.sched-day input[type=number]{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px;font-size:12px;width:100%;font-family:'IBM Plex Mono',monospace;}

  .switch{position:relative;width:40px;height:22px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .slider{position:absolute;inset:0;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:0.15s;}
  .slider:before{content:"";position:absolute;width:16px;height:16px;left:2px;top:2px;background:var(--text-dim);border-radius:50%;transition:0.15s;}
  input:checked + .slider{background:var(--accent-dim);border-color:var(--accent);}
  input:checked + .slider:before{transform:translateX(18px);background:var(--accent);}

  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
  .stat-box .label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;}
  .stat-box .value{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;margin-top:4px;}
  .stat-box .value.normal{color:var(--normal);}
  .stat-box .value.overtime{color:var(--overtime);}
  .stat-box .value.under{color:var(--under);}

  .period-picker{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .period-picker button{background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);padding:7px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;}
  .period-picker button.active{background:var(--accent);color:#1B1E26;border-color:var(--accent);font-weight:600;}

  .chart-wrap{position:relative;height:220px;margin-top:8px;}

  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .cal-nav button{background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:14px;}
  .cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;font-size:10px;color:var(--text-dim);text-align:center;text-transform:uppercase;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;font-size:11px;font-family:'IBM Plex Mono',monospace;cursor:pointer;background:var(--surface-2);color:var(--text-dim);gap:1px;line-height:1;}
  .cal-cell.cal-blank{visibility:hidden;cursor:default;}
  .cal-cell .cal-daynum{font-size:11px;}
  .cal-cell .cal-marker{font-size:10px;}
  .cal-cell.cal-green{background:#233A34;color:var(--normal);}
  .cal-cell.cal-red{background:#3E2420;color:#E08479;}
  .cal-cell.cal-blue{background:#243347;color:#8FB4E0;}
  .cal-cell.cal-blue .cal-marker{color:#8FB4E0;}
  .cal-cell.cal-neutral{background:var(--surface-2);color:var(--text-dim);}
  .cal-cell.cal-future{background:transparent;border:1px dashed var(--border);color:var(--text-dim);cursor:default;}
  .cal-legend{display:flex;gap:14px;margin-top:12px;font-size:11px;color:var(--text-dim);flex-wrap:wrap;}
  .cal-legend .dot{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle;}

  #printArea{display:none;}
  @media print{
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{display:block;position:absolute;top:0;left:0;width:100%;padding:20px;color:#000;background:#fff;}
    #printArea table{width:100%;border-collapse:collapse;font-size:11px;}
    #printArea th,#printArea td{border-bottom:1px solid #ccc;padding:5px 6px;text-align:left;}
  }
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<div id="appShell">
  <div class="app-header">
    <div class="brand">
      <div class="stamp">IN/OUT</div>
      <div><h1>Timecard</h1><div class="sub">work hours &amp; overtime</div></div>
    </div>
    <div class="today-chip" id="todayChip"></div>
  </div>

  <main id="main"></main>

  <nav class="tabs" id="tabs">
    <button data-tab="log"><span class="ic">&#9201;</span>Log</button>
    <button data-tab="leave"><span class="ic">&#127796;</span>Leave</button>
    <button data-tab="stats"><span class="ic">&#128202;</span>Stats</button>
    <button data-tab="settings"><span class="ic">&#9881;</span>Settings</button>
  </nav>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>
<div id="printArea"></div>

<script>
// ================= constants =================
const DAY_KEYS = ['sun','mon','tue','wed','thu','fri','sat'];
const DAY_LABELS = {sun:'Sun',mon:'Mon',tue:'Tue',wed:'Wed',thu:'Thu',fri:'Fri',sat:'Sat'};
const DEFAULT_SETTINGS = {
  schedule: {
    mon:{enabled:true,start:'07:00',end:'16:00',lunchMinutes:60},
    tue:{enabled:true,start:'07:00',end:'16:00',lunchMinutes:60},
    wed:{enabled:true,start:'07:00',end:'16:00',lunchMinutes:60},
    thu:{enabled:true,start:'07:00',end:'16:00',lunchMinutes:60},
    fri:{enabled:true,start:'07:00',end:'15:00',lunchMinutes:60},
    sat:{enabled:false,start:'00:00',end:'00:00',lunchMinutes:0},
    sun:{enabled:false,start:'00:00',end:'00:00',lunchMinutes:0}
  }
};

let state = {
  settings: JSON.parse(JSON.stringify(DEFAULT_SETTINGS)),
  sessions: [],   // {id, date, location, clockIn, clockOut, breaks:[{type,start,end}], notes}
  leaves: [],     // {id, dateFrom, dateTo, type, comment}
  dayOverrides: {}, // { 'YYYY-MM-DD': targetMinutes } — overrides the schedule-derived target for that date
  activeSession: null, // {id, date, location, startTs, breaks:[{type,startTs,endTs}], openBreak:{type,startTs}|null}
  activeTab: 'log',
  statsPeriod: 'month',
  customStart: null,
  customEnd: null,
  calYear: null,
  calMonth: null,
  backupHandle: null,
  backupNeedsReconnect: false
};
const FS_SUPPORTED = 'showSaveFilePicker' in window;
let chartRefs = {};
let liveInterval = null;

// ================= storage =================
async function loadAll(){
  try{ const v = localStorage.getItem('tc_settings'); if(v) state.settings = JSON.parse(v); }catch(e){}
  try{ const v = localStorage.getItem('tc_sessions'); if(v) state.sessions = JSON.parse(v); }catch(e){}
  try{ const v = localStorage.getItem('tc_leaves'); if(v) state.leaves = JSON.parse(v); }catch(e){}
  try{ const v = localStorage.getItem('tc_activeSession'); if(v) state.activeSession = JSON.parse(v); }catch(e){}
  try{ const v = localStorage.getItem('tc_dayOverrides'); if(v) state.dayOverrides = JSON.parse(v); }catch(e){}
  if(FS_SUPPORTED){
    try{
      const handle = await loadStoredHandle();
      if(handle){
        state.backupHandle = handle;
        const perm = await handle.queryPermission({mode:'readwrite'});
        state.backupNeedsReconnect = (perm !== 'granted');
      }
    }catch(e){ /* handle no longer valid */ }
  }
}
// Uses plain browser localStorage so this works as a standalone saved file,
// not just inside a chat preview. Calls below are fire-and-forget (not
// awaited at the call site) so the UI updates instantly.
async function saveSettings(){ try{ localStorage.setItem('tc_settings', JSON.stringify(state.settings)); }catch(e){ console.error('save settings failed', e); } triggerBackup(); }
async function saveSessions(){ try{ localStorage.setItem('tc_sessions', JSON.stringify(state.sessions)); }catch(e){ console.error('save sessions failed', e); } triggerBackup(); }
async function saveLeaves(){ try{ localStorage.setItem('tc_leaves', JSON.stringify(state.leaves)); }catch(e){ console.error('save leaves failed', e); } triggerBackup(); }
async function saveActiveSession(){
  try{
    if(state.activeSession){ localStorage.setItem('tc_activeSession', JSON.stringify(state.activeSession)); }
    else { localStorage.removeItem('tc_activeSession'); }
  }catch(e){ console.error('save active session failed', e); }
}
async function saveDayOverrides(){ try{ localStorage.setItem('tc_dayOverrides', JSON.stringify(state.dayOverrides)); }catch(e){ console.error('save overrides failed', e); } triggerBackup(); }

// ================= linked backup file (Chrome/Edge only) =================
function openHandleDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open('timecardFS', 1);
    req.onupgradeneeded = ()=> req.result.createObjectStore('handles');
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
async function storeHandle(handle){
  const db = await openHandleDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('handles','readwrite');
    tx.objectStore('handles').put(handle,'backupFile');
    tx.oncomplete = resolve; tx.onerror = ()=>reject(tx.error);
  });
}
async function loadStoredHandle(){
  const db = await openHandleDB();
  return new Promise((resolve)=>{
    const tx = db.transaction('handles','readonly');
    const req = tx.objectStore('handles').get('backupFile');
    req.onsuccess = ()=> resolve(req.result || null);
    req.onerror = ()=> resolve(null);
  });
}
async function clearStoredHandle(){
  const db = await openHandleDB();
  return new Promise((resolve)=>{
    const tx = db.transaction('handles','readwrite');
    tx.objectStore('handles').delete('backupFile');
    tx.oncomplete = resolve; tx.onerror = resolve;
  });
}

async function chooseBackupFile(){
  if(!FS_SUPPORTED) return;
  try{
    const handle = await window.showSaveFilePicker({
      suggestedName: 'timecard-backup.json',
      types: [{ description:'JSON backup', accept: {'application/json': ['.json']} }]
    });
    await storeHandle(handle);
    state.backupHandle = handle;
    state.backupNeedsReconnect = false;
    await writeBackupFile();
    toast('Auto-backup linked');
    render();
  }catch(e){ /* user cancelled picker */ }
}
async function unlinkBackupFile(){
  await clearStoredHandle();
  state.backupHandle = null;
  state.backupNeedsReconnect = false;
  render();
}
async function reconnectBackupFile(){
  if(!state.backupHandle) return;
  try{
    const perm = await state.backupHandle.requestPermission({mode:'readwrite'});
    if(perm === 'granted'){ state.backupNeedsReconnect = false; await writeBackupFile(); toast('Auto-backup reconnected'); render(); }
  }catch(e){ console.error(e); }
}
async function writeBackupFile(){
  if(!state.backupHandle) return;
  try{
    const perm = await state.backupHandle.queryPermission({mode:'readwrite'});
    if(perm !== 'granted'){ state.backupNeedsReconnect = true; return; }
    const writable = await state.backupHandle.createWritable();
    await writable.write(JSON.stringify({
      settings: state.settings, sessions: state.sessions, leaves: state.leaves,
      exportedAt: new Date().toISOString()
    }, null, 2));
    await writable.close();
    state.backupNeedsReconnect = false;
    markBackedUpNow();
  }catch(e){ console.error('backup write failed', e); }
}
function markBackedUpNow(){ try{ localStorage.setItem('tc_lastBackupAt', new Date().toISOString()); }catch(e){} }
function lastBackupLabel(){
  let ts;
  try{ ts = localStorage.getItem('tc_lastBackupAt'); }catch(e){}
  if(!ts) return {text:'Never backed up', warn:true};
  const days = Math.floor((Date.now()-new Date(ts).getTime())/86400000);
  if(days<1) return {text:'Backed up today', warn:false};
  if(days<7) return {text:`Backed up ${days} day${days!==1?'s':''} ago`, warn:false};
  return {text:`Last backup was ${days} days ago`, warn:true};
}
function triggerBackup(){ if(state.backupHandle) writeBackupFile(); }

async function restoreFromFile(file){
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    if(!confirm('This replaces all current data on this device with the contents of the backup file. Continue?')) return;
    state.settings = parsed.settings || JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
    state.sessions = parsed.sessions || [];
    state.leaves = parsed.leaves || [];
    saveSettings(); saveSessions(); saveLeaves();
    render();
    toast('Backup restored');
  }catch(e){

// ================= helpers =================
function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36); }
function toMinutes(hhmm){ if(!hhmm) return 0; const [h,m]=hhmm.split(':').map(Number); return h*60+m; }
function fmtHM(totalMinutes){
  const sign = totalMinutes < 0 ? '-' : '';
  const abs = Math.round(Math.abs(totalMinutes));
  return `${sign}${Math.floor(abs/60)}h ${(abs%60).toString().padStart(2,'0')}m`;
}
function fmtHours(totalMinutes){ return (totalMinutes/60).toFixed(2); }
function fmtStopwatch(ms){
  const totalSec = Math.floor(ms/1000);
  const h = Math.floor(totalSec/3600), m = Math.floor((totalSec%3600)/60), s = totalSec%60;
  return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}
function todayStr(){ return isoDate(new Date()); }
function isoDate(d){ return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`; }
function nowHHMM(){ const d=new Date(); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; }
function dowKey(dateStr){ return DAY_KEYS[new Date(dateStr+'T00:00:00').getDay()]; }
function niceDate(dateStr){ return new Date(dateStr+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}); }
function monthLabel(dateStr){ return new Date(dateStr+'T00:00:00').toLocaleDateString(undefined,{month:'long',year:'numeric'}); }
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function daysBetweenInclusive(a,b){
  const d1 = new Date(a+'T00:00:00'), d2 = new Date(b+'T00:00:00');
  return Math.round((d2-d1)/86400000) + 1;
}
function leaveForDate(dateStr){
  return state.leaves.find(l=> dateStr>=l.dateFrom && dateStr<=l.dateTo) || null;
}
// number of days of `leave` that fall within [start,end], inclusive, clipped to the leave's own range
function leaveDaysClipped(leave, start, end){
  const from = leave.dateFrom > start ? leave.dateFrom : start;
  const to = leave.dateTo < end ? leave.dateTo : end;
  if(from > to) return 0;
  return daysBetweenInclusive(from, to);
}
function targetMinutesFor(dateStr){
  if(Object.prototype.hasOwnProperty.call(state.dayOverrides, dateStr)){
    return Math.max(0, state.dayOverrides[dateStr]);
  }
  const sched = state.settings.schedule[dowKey(dateStr)];
  return (sched && sched.enabled) ? Math.max(0,(toMinutes(sched.end)-toMinutes(sched.start))-(sched.lunchMinutes||0)) : 0;
}

// worked minutes for one finished session (breaks subtracted regardless of type)
function computeSessionWorked(session){
  if(!session.clockOut) return 0;
  let span = toMinutes(session.clockOut) - toMinutes(session.clockIn);
  if(span < 0) span += 24*60;
  let deducted = 0;
  (session.breaks||[]).forEach(b=>{
    if(b.start && b.end){ let d = toMinutes(b.end)-toMinutes(b.start); if(d>0) deducted += d; }
  });
  return Math.max(0, span - deducted);
}

function sessionsByDate(){
  const map = {};
  state.sessions.forEach(s=>{ (map[s.date] = map[s.date]||[]).push(s); });
  return map;
}

// day-level aggregate across all sessions for that date
function dayStats(dateStr, grouped){
  const list = (grouped ? grouped[dateStr] : sessionsByDate()[dateStr]) || [];
  const worked = list.reduce((a,s)=>a+computeSessionWorked(s),0);
  const target = targetMinutesFor(dateStr);
  const normal = Math.min(worked,target);
  const overtime = Math.max(0, worked-target);
  const undertime = Math.max(0, target-worked);
  return {date:dateStr, worked, target, normal, overtime, undertime};
}

// ================= LOG TAB =================
function renderLogTab(){
  const grouped = sessionsByDate();
  const dates = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  let byMonth = {};
  dates.forEach(d=>{ (byMonth[monthLabel(d)] = byMonth[monthLabel(d)]||[]).push(d); });

  let html = renderStopwatch();

  html += `<button class="btn secondary full" id="btnManualEntry">+ Add / backfill a day manually</button>`;

  if(dates.length===0){
    html += `<div class="empty">No sessions yet. Clock in above, or add a past day manually.</div>`;
  } else {
    Object.keys(byMonth).forEach(month=>{
      html += `<div class="month-label">${month}</div>`;
      byMonth[month].forEach(dateStr=>{
        const stats = dayStats(dateStr, grouped);
        let badge = '';
        if(stats.overtime>0) badge = `<span class="badge overtime">+${fmtHM(stats.overtime)} OT</span>`;
        else if(stats.undertime>0 && stats.target>0) badge = `<span class="badge under">-${fmtHM(stats.undertime)}</span>`;
        else if(stats.target>0) badge = `<span class="badge normal">on target</span>`;

        html += `<div class="card day-card">
          <div class="day-card-head">
            <div class="dtitle">${niceDate(dateStr)}</div>
            <div style="display:flex;align-items:center;gap:8px;">
              <div class="dtotal">${fmtHours(stats.worked)}h</div>
              <button type="button" class="icon-btn edit-target-btn" data-date="${dateStr}" title="Edit required hours for this day">&#9998;</button>
            </div>
          </div>
          <div style="margin-bottom:8px;">${badge}${Object.prototype.hasOwnProperty.call(state.dayOverrides,dateStr) ? ' <span class="badge under">custom target</span>' : ''}</div>`;
        grouped[dateStr].sort((a,b)=>toMinutes(a.clockIn)-toMinutes(b.clockIn)).forEach(s=>{
          const worked = computeSessionWorked(s);
          const breakBadges = (s.breaks||[]).filter(b=>b.start&&b.end).map(b=>`<span class="badge ${b.type}">${b.type==='lunch'?'lunch':'break'} ${b.start}-${b.end}</span>`).join(' ');
          html += `<div class="entry-row" data-session-id="${s.id}">

              <span class="badge ${s.location.toLowerCase()}">${s.location}</span>
              <div class="entry-sub">${s.clockIn}&ndash;${s.clockOut||'&hellip;'} ${breakBadges}</div>
            </div>
            <div class="entry-hours"><div class="h">${fmtHours(worked)}h</div></div>
          </div>`;
        });
        html += `</div>`;
      });
    });
  }
  return html;
}

function renderStopwatch(){
  const a = state.activeSession;
  if(!a){
    return `
      <div class="stopwatch">
        <div class="sw-state">Ready to clock in</div>
        <div class="sw-loc-seg" id="sw_loc_seg">
          <button type="button" data-loc="Office" class="active">&#127970;<span>Office</span></button>
          <button type="button" data-loc="Remote">&#127968;<span>Remote</span></button>
          <button type="button" data-loc="Site">&#128205;<span>Site</span></button>
        </div>
        <button class="sw-clockin-btn" id="btnClockIn">CLOCK<br>IN</button>
        ${todayTotalLine()}
      </div>`;
  }
  const onBreak = !!a.openBreak;
  return `
    <div class="stopwatch">
      <div class="sw-state ${onBreak?'paused':'live'}">${onBreak? (a.openBreak.type==='lunch'?'On lunch':'On break') : 'Clocked in &middot; '+a.location}</div>
      <div class="sw-timer ${onBreak?'paused':''}" id="swTimerDisplay">00:00:00</div>
      <div class="sw-sub">${onBreak? 'since '+hhmmFromTs(a.openBreak.startTs) : 'since '+hhmmFromTs(a.startTs)}</div>
      ${onBreak ? `
        <div class="sw-actions paused-mode">
          <button class="btn" id="btnResume">Resume</button>
        </div>
      ` : `
        <div class="sw-actions">
          <button class="btn secondary" id="btnTakeBreak">Take Break</button>
          <button class="btn secondary" id="btnTakeLunch">Take Lunch</button>
          <button class="btn" id="btnClockOut">Clock Out</button>
        </div>
      `}
      ${todayTotalLine()}
    </div>`;
}

function todayTotalLine(){
  const stats = dayStats(todayStr());
  if(stats.worked<=0) return '';
  let extra = stats.overtime>0 ? ` &middot; <span style="color:var(--overtime);">+${fmtHM(stats.overtime)} OT</span>` : '';
  return `<div class="sw-today-total">Today so far: <b>${fmtHM(stats.worked)}</b>${extra}</div>`;
}

function hhmmFromTs(ts){ const d=new Date(ts); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; }

function startLiveInterval(){
  if(liveInterval) return;
  updateLiveDisplay();
  liveInterval = setInterval(updateLiveDisplay, 1000);
}
function stopLiveInterval(){ if(liveInterval){ clearInterval(liveInterval); liveInterval=null; } }
function updateLiveDisplay(){
  const el = document.getElementById('swTimerDisplay');
  if(!el || !state.activeSession) return;
  const a = state.activeSession;
  let ms;
  if(a.openBreak){ ms = Date.now() - a.openBreak.startTs; }
  else {
    let breaksMs = (a.breaks||[]).reduce((sum,b)=> sum + (b.endTs? (b.endTs-b.startTs):0), 0);
    ms = Date.now() - a.startTs - breaksMs;
  }
  el.textContent = fmtStopwatch(Math.max(0,ms));
}

// ---- clock actions ----
function clockIn(location){
  state.activeSession = { id: uid(), date: todayStr(), location, startTs: Date.now(), breaks: [], openBreak: null };
  render();
  saveActiveSession();
}
function takeBreak(type){
  if(!state.activeSession || state.activeSession.openBreak) return;
  state.activeSession.openBreak = { type, startTs: Date.now() };
  render();
  saveActiveSession();
}
function resumeFromBreak(){
  const a = state.activeSession;
  if(!a || !a.openBreak) return;
  a.breaks.push({ type: a.openBreak.type, startTs: a.openBreak.startTs, endTs: Date.now() });
  a.openBreak = null;
  render();
  saveActiveSession();
}
function clockOut(){
  const a = state.activeSession;
  if(!a) return;
  if(a.openBreak){ a.breaks.push({ type:a.openBreak.type, startTs:a.openBreak.startTs, endTs: Date.now() }); a.openBreak = null; }
  const session = {
    id: a.id, date: a.date, location: a.location,
    clockIn: hhmmFromTs(a.startTs), clockOut: nowHHMM(),
    breaks: a.breaks.map(b=>({ type:b.type, start:hhmmFromTs(b.startTs), end:hhmmFromTs(b.endTs) })),
    notes: ''
  };
  state.sessions.push(session);
  state.activeSession = null;
  render();
  saveSessions();
  saveActiveSession();
}

async function saveSessionFromForm(existingId){
  const date = document.getElementById('f_date').value;
  const location = document.querySelector('#f_location_seg button.active').dataset.loc;
  const clockIn = document.getElementById('f_in').value;
  const clockOut = document.getElementById('f_out').value;

  const breaks = [...document.querySelectorAll('.break-item')].map(row=>({
    type: row.querySelector('.brk-type').value,
    start: row.querySelector('.brk-start').value,
    end: row.querySelector('.brk-end').value
  })).filter(b=>b.start && b.end);

  if(!date||!clockIn||!clockOut){ alert('Date, clock in, and clock out are required.'); return; }
  if(toMinutes(clockOut) <= toMinutes(clockIn)){ alert('Clock out must be after clock in.'); return; }

  const sessionData = {date, location, clockIn, clockOut, breaks, notes};
  if(existingId){
    const idx = state.sessions.findIndex(s=>s.id===existingId);
    state.sessions[idx] = {...state.sessions[idx], ...sessionData};
  } else {
    state.sessions.push({id: uid(), ...sessionData});

  closeModal();
  render();
  saveSessions();
}

  state.sessions = state.sessions.filter(s=>s.id!==id);

}

      <div class="entry-sub" style="margin-bottom:10px;">Linked &middot; every change saves straight to <b style="color:var(--text);">${escapeHtml(state.backupHandle.name)}</b>. Point that file at a synced Drive/OneDrive/iCloud folder for automatic cloud backup.</div>
      <button class="btn secondary full" id="btnUnlinkBackup">Unlink backup file</button>`;
  }
  if(state.backupHandle && state.backupNeedsReconnect){
    return `
      <div class="entry-sub" style="margin-bottom:10px;color:var(--overtime);">Backup file access needs to be reconfirmed (this can happen after a browser restart).</div>
      <button class="btn full" id="btnReconnectBackup">Reconnect ${escapeHtml(state.backupHandle.name)}</button>`;
  }
  return `
    <div class="entry-sub" style="margin-bottom:10px;">Pick or create a file once &mdash; every change after that writes to it automatically. Choose a location inside your Drive/OneDrive/iCloud desktop folder to get automatic cloud backup.</div>
    <button class="btn full" id="btnChooseBackup">Choose backup file</button>`;
}

// ================= STATS TAB =================
function periodRange(period){
  const now = new Date();
  let start, end;
  if(period==='today'){
    return { start: todayStr(), end: todayStr() };
  } else if(period==='custom'){
    return { start: state.customStart || todayStr(), end: state.customEnd || todayStr() };
  } else if(period==='week'){
    const day = now.getDay(); const diffToMon = (day===0? -6 : 1-day);
    start = new Date(now); start.setDate(now.getDate()+diffToMon);
    end = new Date(start); end.setDate(start.getDate()+6);
  } else if(period==='month'){
    start = new Date(now.getFullYear(), now.getMonth(), 1);
    end = new Date(now.getFullYear(), now.getMonth()+1, 0);
  } else {
    start = new Date(now.getFullYear(),0,1); end = new Date(now.getFullYear(),11,31);
  }
  return {start: isoDate(start), end: isoDate(end)};
}
function ensureCalendarDefaults(){
  if(state.calYear===null){ const d=new Date(); state.calYear=d.getFullYear(); state.calMonth=d.getMonth(); }
}
function calendarDayColor(dateStr){
  if(leaveForDate(dateStr)) return 'blue';
  if(dateStr > todayStr()) return 'future';
  const stats = dayStats(dateStr);
  if(stats.target<=0) return stats.worked>0 ? 'green' : 'neutral';
  if(stats.undertime < 5) return 'green';
  return 'red';
}
function renderCalendarSection(){
  ensureCalendarDefaults();
  const year = state.calYear, month = state.calMonth;
  const firstOfMonth = new Date(year, month, 1);
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const startOffset = firstOfMonth.getDay();
  const monthName = firstOfMonth.toLocaleDateString(undefined,{month:'long',year:'numeric'});
  let cells = '';
  for(let i=0;i<startOffset;i++) cells += `<div class="cal-cell cal-blank"></div>`;
  for(let day=1; day<=daysInMonth; day++){
    const dateStr = `${year}-${(month+1).toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`;
    const color = calendarDayColor(dateStr);
    const leave = leaveForDate(dateStr);
    let marker = '';
    if(leave){ marker = leave.type==='sick' ? '&#128137;' : '&times;'; }
    cells += `<div class="cal-cell cal-${color}" data-cal-date="${dateStr}"><span class="cal-daynum">${day}</span>${marker? `<span class="cal-marker">${marker}</span>`:''}</div>`;
  }
  return `
    <div class="card">
      <div class="card-title">Calendar overview</div>
      <div class="cal-nav">
        <button type="button" id="calPrev">&larr;</button>
        <div style="font-weight:600;font-size:13px;">${monthName}</div>
        <button type="button" id="calNext">&rarr;</button>
      </div>
      <div class="cal-header">${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div>${d}</div>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
      <div class="cal-legend">
        <span><span class="dot" style="background:#233A34;"></span>Met / exceeded</span>
        <span><span class="dot" style="background:#3E2420;"></span>Shortfall</span>
        <span><span class="dot" style="background:#243347;"></span>Leave (&times;) / Sick (&#128137;)</span>
      </div>
    </div>`;
}
function attachCalendarEvents(){
  const prev = document.getElementById('calPrev');
  const next = document.getElementById('calNext');
  if(prev) prev.addEventListener('click', ()=>{
    state.calMonth--; if(state.calMonth<0){ state.calMonth=11; state.calYear--; }
    render();
  });
  if(next) next.addEventListener('click', ()=>{
    state.calMonth++; if(state.calMonth>11){ state.calMonth=0; state.calYear++; }
    render();
  });
  document.querySelectorAll('.cal-cell[data-cal-date]').forEach(cell=>{
    cell.addEventListener('click', ()=>{
      const dateStr = cell.dataset.calDate;
      const stats = dayStats(dateStr);
      const leave = leaveForDate(dateStr);
      if(leave){ toast(`${niceDate(dateStr)}: ${leave.type} leave`); }
      else { toast(`${niceDate(dateStr)}: worked ${fmtHours(stats.worked)}h of ${fmtHours(stats.target)}h target`); }
    });
  });
}
function renderStatsTab(){
  const {start,end} = periodRange(state.statsPeriod);
  const grouped = sessionsByDate();
  const datesInRange = Object.keys(grouped).filter(d=> d>=start && d<=end).sort();
  const leavesInRange = state.leaves.filter(l=> l.dateTo>=start && l.dateFrom<=end);

  let worked=0, normal=0, overtime=0, undertime=0;
  const byLocation = {Office:0, Remote:0, Site:0};
  datesInRange.forEach(d=>{
    const stats = dayStats(d, grouped);
    worked+=stats.worked; normal+=stats.normal; overtime+=stats.overtime; undertime+=stats.undertime;
    grouped[d].forEach(s=>{ byLocation[s.location] = (byLocation[s.location]||0) + computeSessionWorked(s); });
  });
  const annualDays = leavesInRange.filter(l=>l.type==='annual').reduce((sum,l)=>sum+leaveDaysClipped(l,start,end),0);
  const sickDays = leavesInRange.filter(l=>l.type==='sick').reduce((sum,l)=>sum+leaveDaysClipped(l,start,end),0);
  const otherDays = leavesInRange.filter(l=>l.type==='other').reduce((sum,l)=>sum+leaveDaysClipped(l,start,end),0);

  return `
    <div class="period-picker">
      <button data-period="today" class="${state.statsPeriod==='today'?'active':''}">Today</button>
      <button data-period="week" class="${state.statsPeriod==='week'?'active':''}">This Week</button>
      <button data-period="month" class="${state.statsPeriod==='month'?'active':''}">This Month</button>
      <button data-period="year" class="${state.statsPeriod==='year'?'active':''}">This Year</button>
      <button data-period="custom" class="${state.statsPeriod==='custom'?'active':''}">Custom</button>
    </div>
    ${state.statsPeriod==='custom' ? `
      <div class="card">
        <div class="two-col">
          <div class="field"><label>From</label><input type="date" id="customStart" value="${state.customStart||todayStr()}"></div>
          <div class="field"><label>To</label><input type="date" id="customEnd" value="${state.customEnd||todayStr()}"></div>
        </div>
      </div>
    ` : ''}
    <div class="stat-grid">
      <div class="stat-box"><div class="label">Worked</div><div class="value">${fmtHours(worked)}h</div></div>
      <div class="stat-box"><div class="label">Normal hours</div><div class="value normal">${fmtHours(normal)}h</div></div>
      <div class="stat-box"><div class="label">Overtime</div><div class="value overtime">${fmtHours(overtime)}h</div></div>
      <div class="stat-box"><div class="label">Shortfall</div><div class="value under">${fmtHours(undertime)}h</div></div>
    </div>
    ${renderCalendarSection()}
    <div class="card"><div class="card-title">Worked vs. normal, overtime</div><div class="chart-wrap"><canvas id="chartBreakdown"></canvas></div></div>
    <div class="card"><div class="card-title">Hours by location</div><div class="chart-wrap" style="height:200px;"><canvas id="chartLocation"></canvas></div></div>
    <div class="card">
      <div class="card-title">Leave taken</div>
      <div style="display:flex;gap:20px;">
        <div><span class="badge annual">Annual</span><div class="mono" style="margin-top:6px;font-size:16px;">${annualDays} day${annualDays!==1?'s':''}</div></div>
        <div><span class="badge sick">Sick</span><div class="mono" style="margin-top:6px;font-size:16px;">${sickDays} day${sickDays!==1?'s':''}</div></div>
        <div><span class="badge">Other</span><div class="mono" style="margin-top:6px;font-size:16px;">${otherDays} day${otherDays!==1?'s':''}</div></div>
      </div>
    </div>
    <button class="btn secondary full" id="btnPrintReport">Print / Export PDF report</button>`;
}
function attachStatsCharts(){
  attachCalendarEvents();
  const {start,end} = periodRange(state.statsPeriod);
  const grouped = sessionsByDate();
  const dates = Object.keys(grouped).filter(d=>d>=start&&d<=end).sort();

  const ctx1 = document.getElementById('chartBreakdown');
  if(ctx1){
    if(chartRefs.breakdown) chartRefs.breakdown.destroy();
    const dayData = dates.map(d=>dayStats(d,grouped));
    chartRefs.breakdown = new Chart(ctx1, {
      type:'bar',
      data:{
        labels: dates.map(d=> new Date(d+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'})),
        datasets:[
          {label:'Normal', backgroundColor:'#5BA88F', data: dayData.map(x=>x.normal/60), stack:'a'},
          {label:'Overtime', backgroundColor:'#D4753F', data: dayData.map(x=>x.overtime/60), stack:'a'}
        ]
      },
      options:{ responsive:true, maintainAspectRatio:false,
        scales:{ x:{ticks:{color:'#9BA4B5',font:{size:10}},grid:{color:'#3A4150'},stacked:true},
                 y:{ticks:{color:'#9BA4B5'},grid:{color:'#3A4150'},stacked:true,title:{display:true,text:'hours',color:'#9BA4B5'}} },
        plugins:{legend:{labels:{color:'#E9ECF1'}}} }
    });
  }
  const ctx2 = document.getElementById('chartLocation');
  if(ctx2){
    const byLocation = {Office:0, Remote:0, Site:0};
    dates.forEach(d=> grouped[d].forEach(s=>{ byLocation[s.location] = (byLocation[s.location]||0) + computeSessionWorked(s)/60; }));
    if(chartRefs.location) chartRefs.location.destroy();
    chartRefs.location = new Chart(ctx2, {
      type:'doughnut',
      data:{ labels:['Office','Remote','Site'], datasets:[{data:[byLocation.Office,byLocation.Remote,byLocation.Site], backgroundColor:['#7FB8D9','#8FCB86','#D9B67F'], borderWidth:0}] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'right',labels:{color:'#E9ECF1'}}} }
    });
  }
  const printBtn = document.getElementById('btnPrintReport');
  if(printBtn) printBtn.addEventListener('click', ()=>buildAndPrintReport(start,end));
}
function buildAndPrintReport(start,end){
  const grouped = sessionsByDate();
  const dates = Object.keys(grouped).filter(d=>d>=start&&d<=end).sort();
  const leavesInRange = state.leaves.filter(l=>l.dateTo>=start&&l.dateFrom<=end).sort((a,b)=>a.dateFrom.localeCompare(b.dateFrom));
  let worked=0, normal=0, overtime=0;
  let rows = dates.map(d=>{
    const stats = dayStats(d, grouped);
    worked+=stats.worked; normal+=stats.normal; overtime+=stats.overtime;
    const sessTimes = grouped[d].map(s=>`${s.clockIn}-${s.clockOut}`).join(', ');
    return `<tr><td>${niceDate(d)}</td><td>${sessTimes}</td><td>${fmtHours(stats.worked)}</td><td>${fmtHours(stats.normal)}</td><td>${fmtHours(stats.overtime)}</td></tr>`;
  }).join('');
  let leaveRows = leavesInRange.map(l=>{
    const rangeLabel = l.dateFrom===l.dateTo ? niceDate(l.dateFrom) : `${niceDate(l.dateFrom)} - ${niceDate(l.dateTo)}`;
    return `<tr><td>${rangeLabel}</td><td>${l.type}</td><td>${escapeHtml(l.comment||'')}</td></tr>`;
  }).join('');
  document.getElementById('printArea').innerHTML = `
    <h1 style="font-family:sans-serif;">Work Hours Report</h1>
    <p>${niceDate(start)} &ndash; ${niceDate(end)}</p>
    <h3>Summary</h3>
    <p>Worked: ${fmtHours(worked)}h &nbsp; Normal: ${fmtHours(normal)}h &nbsp; Overtime: ${fmtHours(overtime)}h</p>
    <h3>Days</h3>
    <table><thead><tr><th>Date</th><th>Sessions</th><th>Worked (h)</th><th>Normal (h)</th><th>Overtime (h)</th></tr></thead><tbody>${rows}</tbody></table>
    <h3>Leave</h3>
    <table><thead><tr><th>Date</th><th>Type</th><th>Comment</th></tr></thead><tbody>${leaveRows}</tbody></table>`;
  window.print();
}

// ================= modal / toast helpers =================
function showModal(html){ document.getElementById('modalContent').innerHTML = html; document.getElementById('modalOverlay').classList.add('open'); }
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }
function toast(msg){
  const t = document.createElement('div'); t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:10px 18px;border-radius:20px;font-size:13px;z-index:200;';
  document.body.appendChild(t); setTimeout(()=>t.remove(), 1800);
}

  const swLocSeg = document.getElementById('sw_loc_seg');

    clockIn(loc);
  });

  const btnTakeLunch = document.getElementById('btnTakeLunch');
  if(btnTakeLunch) btnTakeLunch.addEventListener('click', ()=>takeBreak('lunch'));

  if(btnResume) btnResume.addEventListener('click', resumeFromBreak);
  const btnClockOut = document.getElementById('btnClockOut');
  if(btnClockOut) btnClockOut.addEventListener('click', clockOut);

  const manualBtn = document.getElementById('btnManualEntry');

  document.querySelectorAll('.entry-row[data-session-id]').forEach(row=>{
    row.addEventListener('click', ()=> openSessionModal(row.dataset.sessionId));
  });
  document.querySelectorAll('.edit-target-btn').forEach(btn=>{
    btn.addEventListener('click', ev=>{ ev.stopPropagation(); openDayTargetModal(btn.dataset.date); });
  });

  const newLeaveBtn = document.getElementById('btnNewLeave');
  if(newLeaveBtn) newLeaveBtn.addEventListener('click', ()=>openLeaveModal(null));
  document.querySelectorAll('.entry-row[data-leave-id]').forEach(row=>{
    row.addEventListener('click', ()=> openLeaveModal(row.dataset.leaveId));
  });

  document.querySelectorAll('.period-picker button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.statsPeriod = btn.dataset.period;

        state.customStart = todayStr(); state.customEnd = todayStr();

      render();
    });

  if(customStartInput) customStartInput.addEventListener('change', ()=>{ state.customStart = customStartInput.value; render(); });
  if(customEndInput) customEndInput.addEventListener('change', ()=>{ state.customEnd = customEndInput.value; render(); });

  attachSettingsEvents();
}
document.getElementById('modalOverlay').addEventListener('click', ev=>{ if(ev.target.id==='modalOverlay') closeModal(); });
document.getElementById('tabs').addEventListener('click', ev=>{ const btn = ev.target.closest('button'); if(!btn) return; setTab(btn.dataset.tab); });
